<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Flexton ServiceNow Academy — Interview Coach</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--p:#1B4FBB;--a:#3B7BE6;--s:#10B981;--w:#F59E0B;--d:#EF4444;--o:#FF6B35;--bg:#F1F5F9;--sb:#0B1628;--cd:#FFFFFF;--tx:#1E293B;--mu:#64748B;--fa:#94A3B8;--bo:#E2E8F0}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit;outline:none}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:10px}
/* ── UTILITIES ── */
.hidden{display:none!important}
.flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}.justify-between{justify-content:space-between}.gap-8{gap:8px}.gap-12{gap:12px}.gap-16{gap:16px}
.fw7{font-weight:700}.fw8{font-weight:800}.fw9{font-weight:900}
.fs11{font-size:11px}.fs12{font-size:12px}.fs13{font-size:13px}.fs14{font-size:14px}
.text-muted{color:var(--mu)}.text-faint{color:var(--fa)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border:none;border-radius:10px;font-size:14px;font-weight:600;transition:opacity .15s;white-space:nowrap}
.btn:hover{opacity:.88}.btn-primary{background:var(--p);color:#fff}
.btn-secondary{background:#F1F5F9;color:var(--mu)}.btn-sm{padding:6px 13px;font-size:12px}
.btn-success{background:#F0FDF4;color:#16A34A}.btn-danger{background:#FEF2F2;color:var(--d)}
.btn-warn{background:#FFF7ED;color:#C2410C}.btn-blue{background:#EBF3FF;color:var(--p)}
/* ── FORMS ── */
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--mu);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
.field input,.field select,.field textarea{width:100%;padding:10px 14px;border:1.5px solid var(--bo);border-radius:10px;font-size:14px;background:#fff}
.field textarea{resize:vertical}
/* ── CARDS ── */
.card{background:#fff;border-radius:16px;padding:22px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.card-title{font-size:14px;font-weight:700;color:var(--tx);margin-bottom:14px}
.kpi-card{background:#fff;border-radius:14px;padding:18px 20px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.kpi-val{font-size:28px;font-weight:900;line-height:1}
.kpi-label{font-size:12px;color:var(--mu);margin-top:4px}
/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal-box{background:#fff;border-radius:20px;padding:32px;width:520px;max-width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 30px 80px rgba(0,0,0,.3)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
.modal-header h3{font-size:18px;font-weight:800;color:var(--tx)}
.modal-close{background:none;border:none;font-size:22px;color:var(--mu)}
/* ── SIDEBAR LAYOUT ── */
#main-layout{display:flex;min-height:100vh}
#sidebar{width:232px;background:var(--sb);display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh}
#sidebar-logo{padding:22px 20px 16px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:10px}
#sidebar-logo .icon{width:34px;height:34px;background:linear-gradient(135deg,#1B4FBB,#3B7BE6);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px}
#sidebar-logo .title{font-size:13px;font-weight:800;color:#fff;letter-spacing:-.01em}
#sidebar-logo .sub{font-size:10px;color:#475569}
#sidebar-badge{margin-top:8px;display:inline-flex;align-items:center;gap:5px;padding:3px 9px;background:rgba(16,185,129,.15);border-radius:20px;font-size:10px;color:#6EE7B7;font-weight:600}
#sidebar-nav{flex:1;padding-top:8px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;width:100%;padding:11px 20px;background:transparent;color:#64748B;border:none;text-align:left;font-size:13px;font-weight:400;border-left:3px solid transparent;transition:all .15s}
.nav-item.active{background:rgba(27,79,187,.25);color:#93C5FD;font-weight:700;border-left-color:#3B7BE6}
.nav-item .nav-badge{margin-left:auto;background:rgba(27,79,187,.3);color:#93C5FD;font-size:10px;padding:1px 7px;border-radius:10px}
.nav-item .nav-badge.orange{background:rgba(194,65,12,.4);color:#FED7AA}
#sidebar-foot{padding:14px 20px;border-top:1px solid rgba(255,255,255,.06)}
#sidebar-foot .user-name{font-size:13px;font-weight:700;color:#fff;margin-top:2px}
#sidebar-foot .user-role{font-size:11px;color:#475569;margin-top:1px}
#content{flex:1;padding:32px;overflow-y:auto;max-height:100vh}
/* ── LOGIN ── */
#login-screen{min-height:100vh;background:linear-gradient(145deg,#040e1e 0%,#0b1f45 50%,#1B4FBB 100%);display:flex;align-items:center;justify-content:center}
.login-box{background:rgba(255,255,255,.97);border-radius:24px;padding:48px;width:420px;box-shadow:0 40px 100px rgba(0,0,0,.5)}
/* ── INTERVIEW ROOM (Yoodli-style) ── */
#interview-room{position:fixed;inset:0;background:linear-gradient(135deg,#06090f 0%,#0a1525 60%,#0d1f3c 100%);display:flex;flex-direction:column;z-index:500;font-family:'Segoe UI',system-ui,sans-serif}
.ir-topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:rgba(255,255,255,.03);border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0}
.ir-title{font-size:14px;font-weight:700;color:#93C5FD;display:flex;align-items:center;gap:8px}
.ir-timer{font-size:13px;font-weight:700;color:#475569;font-variant-numeric:tabular-nums;letter-spacing:.04em}
.ir-progress-wrap{flex:1;margin:0 24px;max-width:300px}
.ir-progress-bar{height:4px;background:rgba(255,255,255,.08);border-radius:10px;overflow:hidden}
.ir-progress-fill{height:100%;background:linear-gradient(90deg,var(--p),var(--a));border-radius:10px;transition:width .5s ease}
.ir-progress-label{font-size:10px;color:#475569;margin-top:5px;text-align:center}
.ir-body{flex:1;display:grid;grid-template-columns:280px 1fr;gap:20px;padding:20px;overflow:hidden;min-height:0}
/* Coach panel */
.coach-panel{display:flex;flex-direction:column;gap:16px}
.coach-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:24px;display:flex;flex-direction:column;align-items:center;text-align:center;position:relative;overflow:hidden}
.coach-avatar{width:90px;height:90px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:42px;position:relative;border:2px solid rgba(255,255,255,.1);transition:all .4s}
.coach-avatar.speaking{border-color:var(--a);box-shadow:0 0 0 8px rgba(27,79,187,.15),0 0 0 16px rgba(27,79,187,.07)}
.coach-avatar.listening{border-color:var(--s);box-shadow:0 0 0 8px rgba(16,185,129,.15),0 0 0 16px rgba(16,185,129,.07)}
@keyframes coachPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
.coach-avatar.speaking{animation:coachPulse 1.4s ease-in-out infinite}
.coach-name{font-size:16px;font-weight:700;color:#E2E8F0;margin-top:14px}
.coach-title{font-size:12px;color:#64748B;margin-top:3px}
.coach-status{display:flex;align-items:center;gap:6px;margin-top:10px;font-size:12px}
.coach-status-dot{width:7px;height:7px;border-radius:50%;background:#475569}
.coach-status-dot.speaking{background:#3B7BE6;animation:dotPulse 1s infinite}
.coach-status-dot.listening{background:#10B981;animation:dotPulse 1s infinite}
.coach-status-dot.scoring{background:#F59E0B;animation:dotPulse 1s infinite}
@keyframes dotPulse{0%,100%{opacity:1}50%{opacity:.3}}
/* Waveform bars */
.waveform-box{background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:14px 16px;display:flex;align-items:center;justify-content:center;gap:3px;height:58px}
.wb{width:4px;border-radius:2px;background:var(--a);height:4px;transition:height .1s}
.wf-active .wb:nth-child(1){animation:w .7s 0.00s ease-in-out infinite}
.wf-active .wb:nth-child(2){animation:w .7s 0.07s ease-in-out infinite}
.wf-active .wb:nth-child(3){animation:w .7s 0.14s ease-in-out infinite}
.wf-active .wb:nth-child(4){animation:w .7s 0.21s ease-in-out infinite}
.wf-active .wb:nth-child(5){animation:w .7s 0.28s ease-in-out infinite}
.wf-active .wb:nth-child(6){animation:w .7s 0.35s ease-in-out infinite}
.wf-active .wb:nth-child(7){animation:w .7s 0.28s ease-in-out infinite}
.wf-active .wb:nth-child(8){animation:w .7s 0.21s ease-in-out infinite}
.wf-active .wb:nth-child(9){animation:w .7s 0.14s ease-in-out infinite}
.wf-active .wb:nth-child(10){animation:w .7s 0.07s ease-in-out infinite}
.wf-active .wb:nth-child(11){animation:w .7s 0.00s ease-in-out infinite}
.wf-active .wb:nth-child(12){animation:w .7s 0.07s ease-in-out infinite}
@keyframes w{0%,100%{height:4px}50%{height:26px}}
.waveform-coach .wb{background:var(--a)}
.waveform-cand .wb{background:var(--s)}
/* Content area */
.content-panel{display:flex;flex-direction:column;gap:16px;min-height:0}
.question-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:24px;flex-shrink:0}
.q-meta{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.q-num{font-size:11px;color:#64748B;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.q-cat{padding:2px 10px;background:rgba(27,79,187,.3);color:#93C5FD;border-radius:20px;font-size:11px;font-weight:600}
.q-diff-hard{padding:2px 10px;background:rgba(239,68,68,.2);color:#FCA5A5;border-radius:20px;font-size:11px;font-weight:600}
.q-diff-medium{padding:2px 10px;background:rgba(245,158,11,.2);color:#FCD34D;border-radius:20px;font-size:11px;font-weight:600}
.q-diff-easy{padding:2px 10px;background:rgba(16,185,129,.2);color:#6EE7B7;border-radius:20px;font-size:11px;font-weight:600}
.q-text{font-size:17px;color:#E2E8F0;line-height:1.7;font-weight:500}
.transcript-card{background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.06);border-radius:18px;padding:20px;flex:1;overflow-y:auto;min-height:0}
.transcript-label{font-size:10px;color:#334155;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
#iv-transcript{font-size:15px;color:#94A3B8;line-height:1.8;min-height:60px}
#iv-transcript .spoken{color:#E2E8F0}
/* Score reveal panel */
.score-reveal{background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:24px;margin-top:12px}
.score-reveal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.score-overall{font-size:34px;font-weight:900;line-height:1}
.score-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:14px}
.score-cell{text-align:center;padding:8px 4px;background:rgba(255,255,255,.06);border-radius:9px}
.score-cell .sv{font-size:16px;font-weight:800;line-height:1}
.score-cell .sk{font-size:8px;color:#475569;margin-top:2px;line-height:1.3}
.score-fb{font-size:13px;color:#94A3B8;line-height:1.7;font-style:italic;margin-bottom:10px}
.score-tags{display:flex;gap:8px;flex-wrap:wrap}
/* IR Footer */
.ir-footer{padding:16px 24px;background:rgba(0,0,0,.2);border-top:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:16px}
.ir-waveform-row{flex:1;display:flex;align-items:center;gap:12px}
.ir-controls{display:flex;gap:10px}
.btn-stop{padding:12px 24px;background:rgba(239,68,68,.9);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700}
.btn-submit{padding:12px 24px;background:var(--p);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700}
.btn-next{padding:12px 28px;background:var(--p);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700}
/* ── COACH SELECT SCREEN ── */
#coach-select-screen{position:fixed;inset:0;background:linear-gradient(135deg,#040e1e 0%,#0b1f45 100%);display:flex;align-items:center;justify-content:center;z-index:490;padding:24px}
.cs-box{max-width:860px;width:100%;text-align:center}
.cs-title{font-size:28px;font-weight:900;color:#fff;margin-bottom:8px;letter-spacing:-.02em}
.cs-sub{font-size:14px;color:#475569;margin-bottom:32px}
.cs-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:28px;max-width:700px;margin-left:auto;margin-right:auto}
@media(min-width:700px){.cs-grid{grid-template-columns:repeat(4,1fr)}}
.coach-choice{background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.08);border-radius:18px;padding:24px 16px;cursor:pointer;transition:all .2s;text-align:center}
.coach-choice:hover,.coach-choice.selected{border-color:var(--a);background:rgba(59,123,230,.12)}
.coach-choice .cc-emoji{font-size:36px;margin-bottom:10px}
.coach-choice .cc-name{font-size:15px;font-weight:700;color:#E2E8F0;margin-bottom:3px}
.coach-choice .cc-title{font-size:11px;color:#64748B}
.coach-choice .cc-style{font-size:11px;color:#3B7BE6;margin-top:5px;font-weight:600}
.session-options{display:flex;align-items:center;justify-content:center;gap:24px;flex-wrap:wrap;margin-bottom:28px}
.q-count-opts{display:flex;gap:8px}
.q-count-btn{padding:6px 16px;border-radius:20px;border:1.5px solid rgba(255,255,255,.15);background:transparent;color:#64748B;font-size:13px;font-weight:700}
.q-count-btn.selected{background:var(--p);color:#fff;border-color:var(--p)}
.voice-toggle{display:flex;align-items:center;gap:8px;color:#E2E8F0;font-size:13px}
/* ── RESULTS ── */
#results-screen{min-height:100vh;background:var(--bg);padding:32px}
/* ── ADMIN TABS ── */
.section-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px;flex-wrap:wrap;gap:12px}
.section-title{font-size:22px;font-weight:800;color:var(--tx);letter-spacing:-.02em}
.section-sub{font-size:13px;color:var(--mu);margin-top:4px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
/* Candidate cards */
.cand-card{background:#fff;border-radius:14px;padding:22px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.cand-avatar{width:44px;height:44px;background:linear-gradient(135deg,#1B4FBB,#3B7BE6);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;flex-shrink:0}
.stat-mini{padding:10px 14px;background:var(--bg);border-radius:10px}
.stat-mini .sl{font-size:10px;color:var(--fa);font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.stat-mini .sv{font-size:22px;font-weight:900;margin-top:2px}
/* Question bank */
.q-item{background:#fff;border-radius:13px;padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.07);display:flex;gap:14px;align-items:flex-start}
.q-num-badge{width:30px;height:30px;background:#EBF3FF;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--p);flex-shrink:0}
/* Repository */
.repo-item{background:#fff;border-radius:14px;padding:0;box-shadow:0 1px 4px rgba(0,0,0,.08);overflow:hidden;margin-bottom:10px}
.repo-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;cursor:pointer;user-select:none}
.repo-header:hover{background:#F8FAFC}
.repo-transcript{padding:0 20px 20px;border-top:1px solid var(--bo);display:none}
.repo-transcript.open{display:block}
.transcript-entry{padding:10px 0;border-bottom:1px solid #F8FAFC;font-size:13px;line-height:1.7}
.te-coach{color:#3B7BE6;font-weight:600}
.te-cand{color:#1E293B}
/* Archive */
.archived-card{background:#fff;border-radius:14px;padding:22px;box-shadow:0 1px 4px rgba(0,0,0,.08);border-left:4px solid #CBD5E1;opacity:.92}
/* Info banner */
.info-banner{border-radius:10px;padding:10px 16px;font-size:13px;margin-bottom:16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.info-green{background:#F0FDF4;border:1px solid #BBF7D0;color:#15803D}
.info-amber{background:#FFF7ED;border:1px solid #FED7AA;color:#92400E}
.info-blue{background:#EBF3FF;border:1px solid #BFDBFE;color:#1D4ED8}
/* Empty state */
.empty-state{padding:48px 24px;text-align:center;background:#fff;border-radius:14px;color:var(--fa);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.empty-state .icon{font-size:36px;margin-bottom:10px}
/* Diff tags */
.tag-hard{padding:2px 9px;background:#FEF2F2;color:#EF4444;border-radius:20px;font-size:11px;font-weight:600}
.tag-medium{padding:2px 9px;background:#FFFBEB;color:#D97706;border-radius:20px;font-size:11px;font-weight:600}
.tag-easy{padding:2px 9px;background:#F0FDF4;color:#16A34A;border-radius:20px;font-size:11px;font-weight:600}
/* Score colors */
.sc-great{color:#10B981}.sc-good{color:#F59E0B}.sc-avg{color:#FF6B35}.sc-low{color:#EF4444}
/* Role chips */
.role-chip{padding:5px 12px;border-radius:20px;border:1.5px solid var(--bo);background:#fff;color:var(--mu);font-size:12px;font-weight:400;white-space:nowrap}
.role-chip.active{border-color:var(--p);background:#EBF3FF;color:var(--p);font-weight:700}
/* Charts placeholder */
canvas{max-width:100%;border-radius:8px}

/* ══════════════════════════════════════════════════
   PROFESSIONAL ANIMATIONS & VISUAL POLISH
══════════════════════════════════════════════════ */
@keyframes fadeInUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.93) translateY(-10px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes scaleOut{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(.93) translateY(-10px)}}
@keyframes overlayIn{from{opacity:0;backdrop-filter:blur(0)}to{opacity:1;backdrop-filter:blur(4px)}}
@keyframes overlayOut{from{opacity:1}to{opacity:0}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes scoreReveal{from{opacity:0;transform:scale(.75) translateY(6px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes w{0%,100%{height:4px}50%{height:26px}}

body{font-family:'Inter','Segoe UI',system-ui,sans-serif;-webkit-font-smoothing:antialiased}

/* Modals */
.modal-overlay{animation:overlayIn .22s ease both;background:rgba(15,20,40,.6);backdrop-filter:blur(6px)}
.modal-box{animation:scaleIn .28s cubic-bezier(.16,1,.3,1) both;border:1px solid rgba(255,255,255,.12);box-shadow:0 32px 80px rgba(0,0,0,.35),0 8px 24px rgba(0,0,0,.2)}
.modal-overlay.closing{animation:overlayOut .18s ease forwards}
.modal-box.closing{animation:scaleOut .18s ease forwards}

/* Page transitions */
#content-inner{animation:fadeInUp .34s cubic-bezier(.16,1,.3,1) both}
.cs-box{animation:fadeInUp .45s cubic-bezier(.16,1,.3,1)}

/* Stagger children */
.stagger>*:nth-child(1){animation-delay:.04s}.stagger>*:nth-child(2){animation-delay:.09s}
.stagger>*:nth-child(3){animation-delay:.14s}.stagger>*:nth-child(4){animation-delay:.19s}
.stagger>*:nth-child(5){animation-delay:.24s}.stagger>*:nth-child(n+6){animation-delay:.28s}
.anim-in{animation:fadeInUp .36s cubic-bezier(.16,1,.3,1) both}
.anim-fade{animation:fadeIn .25s ease both}

/* Buttons */
.btn{transition:all .2s cubic-bezier(.16,1,.3,1);letter-spacing:-.01em;position:relative}
.btn:hover:not(:disabled){transform:translateY(-1.5px);box-shadow:0 6px 20px rgba(0,0,0,.18)}
.btn:active:not(:disabled){transform:translateY(.5px) scale(.98);box-shadow:none;transition-duration:.08s}
.btn-primary{background:linear-gradient(135deg,#1B4FBB 0%,#2A5FCC 100%);box-shadow:0 2px 8px rgba(27,79,187,.3)}
.btn-primary:hover:not(:disabled){background:linear-gradient(135deg,#2256CC,#3B6FDD);box-shadow:0 8px 24px rgba(27,79,187,.4)}
.btn-stop{transition:all .2s ease}.btn-stop:hover{box-shadow:0 6px 20px rgba(239,68,68,.4);transform:translateY(-1.5px)}
.btn-next:hover,.btn-submit:hover{transform:translateY(-1.5px);box-shadow:0 6px 20px rgba(27,79,187,.4)}

/* Inputs */
.field input,.field select,.field textarea{transition:border-color .18s ease,box-shadow .18s ease}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#1B4FBB;box-shadow:0 0 0 3px rgba(27,79,187,.14);outline:none}

/* Cards */
.card{transition:box-shadow .22s ease,transform .22s ease;border:1px solid rgba(226,232,240,.7)}
.card:hover{box-shadow:0 6px 28px rgba(0,0,0,.1)}
.kpi-card{transition:all .22s cubic-bezier(.16,1,.3,1);border:1px solid rgba(226,232,240,.7)}
.kpi-card:hover{transform:translateY(-3px);box-shadow:0 10px 32px rgba(0,0,0,.12)}
.cand-card{transition:all .22s ease;border:1px solid rgba(226,232,240,.7)}
.cand-card:hover{box-shadow:0 8px 32px rgba(0,0,0,.1);transform:translateY(-2px)}
.repo-item{transition:box-shadow .2s ease;border:1px solid rgba(226,232,240,.7)}
.repo-item:hover{box-shadow:0 4px 18px rgba(0,0,0,.08)}
.archived-card{transition:all .22s ease}
.archived-card:hover{box-shadow:0 6px 24px rgba(0,0,0,.1);transform:translateY(-1px)}

/* Nav */
.nav-item{transition:all .18s ease;border-radius:0 8px 8px 0;margin:1px 10px 1px 0}
.nav-item:hover:not(.active){background:rgba(255,255,255,.06);color:#94A3B8}
.nav-item.active{border-radius:0 8px 8px 0}
.nav-badge{transition:all .2s ease}

/* Sidebar */
#sidebar{background:linear-gradient(180deg,#0d1b30 0%,#0B1628 60%,#081120 100%)}
#sidebar-logo{background:linear-gradient(135deg,rgba(27,79,187,.12),transparent);padding-bottom:18px}
#content{background:linear-gradient(160deg,#F1F5F9 0%,#EBF0F8 100%)}

/* Score cells */
.score-cell{transition:transform .18s ease,background .18s ease}
.score-cell:hover{transform:scale(1.1)}
.score-cell .sv{animation:scoreReveal .4s cubic-bezier(.16,1,.3,1) both}

/* Coach cards */
.coach-choice{transition:all .22s cubic-bezier(.16,1,.3,1)}
.coach-choice:hover{transform:translateY(-5px);box-shadow:0 14px 40px rgba(59,123,230,.22)}
.coach-choice.selected{transform:translateY(-3px);box-shadow:0 10px 32px rgba(27,79,187,.28);border-color:#3B7BE6}

/* Interview room */
#interview-room{animation:fadeIn .4s ease}
.question-card{transition:all .3s ease}
.coach-avatar{transition:all .35s cubic-bezier(.16,1,.3,1)}
.ir-progress-fill{transition:width .65s cubic-bezier(.16,1,.3,1) !important}

/* Empty state */
.empty-state{animation:fadeIn .4s ease}
.section-title{letter-spacing:-.025em}

/* Modal scrollbar */
.modal-box::-webkit-scrollbar{width:4px}
.modal-box::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:10px}
.modal-header h3{letter-spacing:-.02em}
.modal-close{transition:all .15s ease;border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:#F1F5F9;color:#1E293B}

/* Score tags */
.score-tags span{animation:slideUp .3s ease both}
.score-tags span:nth-child(2){animation-delay:.08s}

/* Section headers */
.kpi-val{letter-spacing:-.03em}

/* Repo headers */
.repo-header{transition:background .15s ease}

/* Role chip */
.role-chip{transition:all .18s ease}
.role-chip:hover{border-color:#1B4FBB;color:#1B4FBB}

/* Progress bar */
.ir-progress-bar{background:rgba(255,255,255,.06);border-radius:10px;overflow:hidden}

/* Waveform animation improvement */
.wf-active .wb:nth-child(1){animation:w .65s 0s ease-in-out infinite}
.wf-active .wb:nth-child(2){animation:w .65s .06s ease-in-out infinite}
.wf-active .wb:nth-child(3){animation:w .65s .12s ease-in-out infinite}
.wf-active .wb:nth-child(4){animation:w .65s .18s ease-in-out infinite}
.wf-active .wb:nth-child(5){animation:w .65s .24s ease-in-out infinite}
.wf-active .wb:nth-child(6){animation:w .65s .30s ease-in-out infinite}
.wf-active .wb:nth-child(7){animation:w .65s .24s ease-in-out infinite}
.wf-active .wb:nth-child(8){animation:w .65s .18s ease-in-out infinite}
.wf-active .wb:nth-child(9){animation:w .65s .12s ease-in-out infinite}
.wf-active .wb:nth-child(10){animation:w .65s .06s ease-in-out infinite}
.wf-active .wb:nth-child(11){animation:w .65s 0s ease-in-out infinite}
.wf-active .wb:nth-child(12){animation:w .65s .06s ease-in-out infinite}
.wf-active .wb:nth-child(n+13){animation:w .65s .10s ease-in-out infinite}

    const profC=has(answer,PROF).length,infC=has(answer,INFML).length;

    const confC=has(answer,CONF).length,hedgeC=has(answer,HEDGE).length;

    const stop=new Set(['would','could','should','about','which','where','their','there','when','what','have','with','that','this','from','been','will','were','they','your','into','how','you','the','and','for','are','but','its','was','has','can','may','did','does','do','an','a','in','of','to','is','at','by','as','or','on','if','be','so','we','he','she','it']);

// Per-coach voice personality settings
const COACH_VOICE={
  emma: {rate:0.84, pitch:1.12, volume:1.0, pauseMs:200},   // warm, measured, expressive
  james:{rate:0.80, pitch:0.94, volume:1.0, pauseMs:280},   // authoritative, deliberate
  priya:{rate:0.88, pitch:1.18, volume:1.0, pauseMs:160},   // energetic, conversational
  alex: {rate:0.78, pitch:1.02, volume:1.0, pauseMs:320},   // precise, weighty pauses
};

function getVoiceForCoach(coachId){
  const coach=COACHES.find(c=>c.id===coachId)||COACHES[0];
  const vv=window.speechSynthesis.getVoices();
  let found=null;
  for(const hint of coach.voiceHints){
    found=vv.find(v=>v.name.toLowerCase().includes(hint.toLowerCase()))||
          vv.find(v=>v.lang.startsWith(hint));
    if(found)break;
  }
  return found||vv.find(v=>v.lang.startsWith('en'))||vv[0];
}

// Split text into natural spoken sentences for human-like pacing
function splitSentences(text){
  // Split at sentence-ending punctuation followed by space or end
  return text.split(/(?<=[.!?])\s+/).map(s=>s.trim()).filter(Boolean);
}

const Voice={
  speak(text,onEnd,coachId){
    if(!window.speechSynthesis){onEnd?.();return;}
    window.speechSynthesis.cancel();
    const settings=COACH_VOICE[coachId]||{rate:0.85,pitch:1.05,volume:1.0,pauseMs:200};
    const sentences=splitSentences(text);
    if(!sentences.length){onEnd?.();return;}
    let idx=0;
    const next=()=>{
      if(idx>=sentences.length){setTimeout(()=>onEnd?.(),100);return;}
      const u=new SpeechSynthesisUtterance(sentences[idx]);
      u.rate=settings.rate;
      u.pitch=settings.pitch + (Math.random()*0.04-0.02); // tiny natural pitch variation
      u.volume=settings.volume;
      const v=getVoiceForCoach(coachId);
      if(v)u.voice=v;
      u.onend=()=>{idx++;setTimeout(next,settings.pauseMs+(Math.random()*80));};
      u.onerror=()=>{idx++;setTimeout(next,100);};
      window.speechSynthesis.speak(u);
    };
    const go=()=>next();
    window.speechSynthesis.getVoices().length?go():(window.speechSynthesis.onvoiceschanged=go);
  },
  stop(){try{window.speechSynthesis?.cancel();}catch{}}
};

// ── Generate rich spoken feedback per question ────────────────────────────────────────────
function generateSpokenFeedback(scoreObj,answer,role,category,coach){
  const {technicalAcumen,clarity,tone,confidence,relevance,depth,structure,overallScore}=scoreObj;
  const wc=answer.trim().split(/\s+/).filter(Boolean).length;
  const roleShort=role?role.split('/')[0].trim():'this role';
  const coachStyle=coach?.id||'emma';

  // Opening acknowledgement — style-matched per coach
  const openings={
    emma:[`That's really helpful, thank you for sharing that with me.`,`Thank you — I could hear you thinking through that one.`,`I appreciate that — let me share some thoughts on your answer.`],
    james:[`Thank you. Let me give you a direct assessment of that response.`,`Noted. Here is my evaluation of what you just said.`,`Right. I have a few specific points on that answer.`],
    priya:[`Oh, that's a good start! Let me give you some detailed feedback now.`,`Thanks for that! There's some really good stuff here — let me break it down.`,`I loved your energy on that one! Here's what I noticed.`],
    alex:[`Recorded. Here is a precise breakdown of that response.`,`Assessment complete. Let me be specific about what I observed.`,`Analysed. Here are the exact reasons behind your score.`]
  };
  const open=pick(openings[coachStyle]||openings.emma);

  // Score context sentence
  let scoreContext='';
  if(overallScore>=9)scoreContext=`You scored ${overallScore} out of ten — that's an excellent response.`;
  else if(overallScore>=8)scoreContext=`Your score is ${overallScore} out of ten, which is a strong result.`;
  else if(overallScore>=7)scoreContext=`You scored ${overallScore} out of ten — a solid answer with room to reach the top band.`;
  else if(overallScore>=6)scoreContext=`You scored ${overallScore} out of ten. That's a decent foundation, but let me explain exactly what held it back.`;
  else if(overallScore>=5)scoreContext=`You scored ${overallScore} out of ten. The main reason it didn't score higher is what I'm about to explain.`;
  else scoreContext=`You scored ${overallScore} out of ten. I want to be direct with you — here's specifically what needs to change for a higher score.`;

  // Strength recognition
  let strengthLine='';
  if(technicalAcumen>=7)strengthLine=`Your technical references were strong — mentioning ${category}-specific concepts is exactly what assessors look for.`;
  else if(confidence>=7)strengthLine=`You spoke with good confidence and ownership, which always reads well in an interview setting.`;
  else if(structure>=7)strengthLine=`Your answer had a clear structure, which makes it easy for an interviewer to follow your thought process.`;
  else if(clarity>=7)strengthLine=`The clarity of your communication was a real positive — your answer was easy to understand.`;
  else if(scoreObj.strengths)strengthLine=`One thing that worked well: ${scoreObj.strengths}.`;

  // Dimension-specific explanations — WHY did they lose marks
  const whyLines=[];

  if(technicalAcumen<7){
    const missing=(ROLE_KW&&ROLE_KW[role]||[]).slice(0,3).join(', ');
    if(technicalAcumen<5){
      whyLines.push(`Your technical acumen score was ${technicalAcumen} out of ten because the answer didn't include any ServiceNow-specific terminology or concepts relevant to ${roleShort}. Assessors use technical vocabulary as a proxy for hands-on experience — so even brief references to things like ${missing||'platform-specific tools and processes'} would have significantly raised this score.`);
    }else{
      whyLines.push(`Technical acumen came in at ${technicalAcumen} out of ten. You touched on relevant concepts, but the depth of technical language wasn't quite there. Try referencing specific ServiceNow features, tools, or processes you've personally used — not just general ideas.`);
    }
  }

  if(depth<7){
    if(wc<40){
      whyLines.push(`Depth scored ${depth} out of ten, mainly because your answer was quite short at around ${wc} words. In a real interview, assessors expect at least eighty to a hundred words per answer, ideally with a concrete example from your experience. More detail signals both knowledge and confidence.`);
    }else if(wc<80){
      whyLines.push(`Depth came in at ${depth} out of ten. Your answer had the right idea, but it needed more substance. Walk through your process step by step, and include a specific example — something like "In my previous role, I handled this by..." — to push that score into the eight or nine range.`);
    }else{
      whyLines.push(`Your depth score was ${depth} out of ten. To push higher, include measurable outcomes in your examples — for instance, how your action reduced resolution time, improved SLA compliance, or saved the team a certain number of hours. Specificity is what separates a seven from a nine.`);
    }
  }

  if(confidence<6){
    whyLines.push(`Confidence scored ${confidence} out of ten. I noticed some hesitation in how you framed your answer — phrases that express uncertainty can reduce your perceived authority. Instead of "I think" or "probably," try "In my experience" or "My standard approach is." That reframing alone can lift your confidence score by two or three points.`);
  }

  if(relevance<6){
    whyLines.push(`Relevance came in at ${relevance} out of ten, which means the answer drifted a little from what was specifically asked about ${category}. A quick way to stay on track is to mentally check, midway through your answer: am I directly addressing what was asked? If not, bring it back to the core question before expanding.`);
  }

  if(structure<6&&wc>50){
    whyLines.push(`Structure scored ${structure} out of ten. Your content was there, but the organisation made it harder to follow than it needed to be. Try this: open with a one-sentence summary of your approach, then walk through it in numbered steps, and close with an outcome or learning. That pattern consistently scores well.`);
  }

  // How to reach 9 or 10
  let improveLine='';
  if(overallScore<9){
    const lowestDim=[
      {k:'technicalAcumen',s:technicalAcumen,tip:`reference at least two or three specific ServiceNow features or processes relevant to ${roleShort}`},
      {k:'depth',s:depth,tip:`expand your answer to at least a hundred words and include one concrete example with an outcome`},
      {k:'confidence',s:confidence,tip:`replace hedging language with assertive first-person statements`},
      {k:'relevance',s:relevance,tip:`keep your answer tightly focused on what was asked before adding context`},
      {k:'structure',s:structure,tip:`organise your response with a clear opening, middle, and conclusion`},
    ].sort((a,b)=>a.s-b.s)[0];
    if(lowestDim){
      improveLine=`To move this score toward a nine or ten, the single highest-impact change is to ${lowestDim.tip}. That one adjustment to your weakest area will make a noticeable difference across multiple dimensions.`;
    }
  }

  // Assemble in natural conversational order
  const parts=[open,scoreContext];
  if(strengthLine)parts.push(strengthLine);
  // Add at most 2 why-lines to keep feedback concise
  whyLines.slice(0,2).forEach(l=>parts.push(l));
  if(improveLine)parts.push(improveLine);

  return parts.join(' ');
}

// RECOGNITION
// ═══════════════════════════════════════════════════
let recog=null,silTimer=null,finalText='',tickTimer=null;
function startRec(onUpdate,onSilence){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return false;
  recog=new SR();recog.continuous=true;recog.interimResults=true;recog.lang='en-US';
  recog.onresult=e=>{
    let interim='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal)finalText+=e.results[i][0].transcript+' ';
      else interim=e.results[i][0].transcript;
    }
    onUpdate&&onUpdate(finalText+interim);
    if(silTimer)clearTimeout(silTimer);
    silTimer=setTimeout(()=>{if(finalText.trim())onSilence&&onSilence(finalText.trim());},5000);
  };
  recog.onerror=()=>{};recog.onend=()=>{};
  recog.start();return true;
}
function stopRec(){
  if(recog){try{recog.stop();}catch{}recog=null;}
  if(silTimer){clearTimeout(silTimer);silTimer=null;}
  finalText='';
}

const sc2c=s=>s>=8?'#10B981':s>=6?'#F59E0B':s>=4?'#FF6B35':'#EF4444';
const sc2l=s=>s>=8?'Excellent':s>=6?'Good':s>=4?'Average':'Needs Work';
const uid=()=>`${Date.now()}_${Math.random().toString(36).slice(2,6)}`;
const fmtDate=d=>new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
const fmtTime=s=>`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const diffTag=d=>`<span class="tag-${d.toLowerCase()}">${d}</span>`;
const scoreCard=(val,lbl)=>{const v=parseFloat(val)||0;return`<div class="score-cell"><div class="sv" style="color:${sc2c(v)}">${v}</div><div class="sk">${esc(lbl)}</div></div>`;};
const modal=(id,title,body,wide)=>`<div id="${id}" class="modal-overlay" onclick="if(event.target===this)closeModal('${id}')"><div class="modal-box"${wide?' style="width:620px"':''} ><div class="modal-header" style="border-bottom:1px solid #F1F5F9;padding-bottom:18px;margin-bottom:18px"><h3>${esc(title)}</h3><button class="modal-close" onclick="closeModal('${id}')">×</button></div>${body}</div></div>`;
window.closeModal=(id)=>{
  const el=document.getElementById(id);
  if(!el)return;
  const box=el.querySelector('.modal-box');
  el.classList.add('closing');
  if(box)box.classList.add('closing');
  setTimeout(()=>{if(el.parentNode)el.remove();},200);
};

function render(){
  const app=document.getElementById('app');
  if(S.screen==='login'){app.innerHTML=renderLogin();document.getElementById('l-user')?.focus();return;}
  if(S.screen==='coach-select'){app.innerHTML=renderCoachSelect();return;}
  if(S.screen==='interview'){app.innerHTML=renderIVRoom();startIVSession();return;}
  if(S.screen==='results'){app.innerHTML=renderResults();return;}
  // Main layout (admin or candidate)
  app.innerHTML=`<div id="main-layout">${renderSidebar()}${renderContentWrap()}</div>`;
  renderContent();
}
function renderContentWrap(){return`<div id="content"><div id="content-inner"></div></div>`;}
function renderContent(){
  const el=document.getElementById('content-inner');
  if(!el)return;
  if(S.screen==='admin'){
    if(S.adminTab==='overview')el.innerHTML=renderAdminOverview();
    else if(S.adminTab==='questions')el.innerHTML=renderAdminQuestions();
    else if(S.adminTab==='candidates')el.innerHTML=renderAdminCandidates();
    else if(S.adminTab==='reports')el.innerHTML=renderAdminReports();
    else if(S.adminTab==='repository')el.innerHTML=renderRepository();
    else if(S.adminTab==='archive')el.innerHTML=renderArchive();
    setTimeout(()=>{buildCharts();OD.updateStatus();updateConfigStatus();},50);
  }else{
    if(S.candTab==='start')el.innerHTML=renderCandidateStart();
    else el.innerHTML=renderCandidateResults();
  }
}

let chartI={};
function buildCharts(){
  if(S.adminTab==='overview'){
    const c=document.getElementById('roleChart');
    if(!c)return;
    if(chartI.role)chartI.role.destroy();
    const roleData=ROLES.map((r,i)=>({name:r.split('/')[0].trim().substring(0,14),count:S.interviews.filter(iv=>iv.role===r).length})).filter(x=>x.count>0);
    if(!roleData.length){c.parentElement.innerHTML='<div class="card-title">Interview Volume by Role</div><div style="color:#94A3B8;text-align:center;padding:40px 0">No data yet</div>';return;}
    chartI.role=new Chart(c,{type:'bar',data:{labels:roleData.map(x=>x.name),datasets:[{data:roleData.map(x=>x.count),backgroundColor:'#1B4FBB',borderRadius:6}]},options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,grid:{color:'#F1F5F9'}},x:{grid:{display:false}}}}});
  }
  if(S.adminTab==='reports'&&S.reportCandId){
    const cIVs=[...S.interviews.filter(i=>i.candidateId===S.reportCandId)].reverse();
    const pc=document.getElementById('progressChart'),rc=document.getElementById('radarChart');
    if(pc&&cIVs.length>1){
      if(chartI.prog)chartI.prog.destroy();
      chartI.prog=new Chart(pc,{type:'line',data:{labels:cIVs.map((_,i)=>`#${i+1}`),datasets:[{label:'Overall',data:cIVs.map(iv=>parseFloat(iv.overallScore)),borderColor:'#1B4FBB',backgroundColor:'rgba(27,79,187,.1)',tension:.4,fill:true},{label:'Technical',data:cIVs.map(iv=>parseFloat(iv.params?.technicalAcumen||0)),borderColor:'#10B981',tension:.4}]},options:{plugins:{legend:{labels:{boxWidth:12}}},scales:{y:{min:0,max:10,grid:{color:'#F1F5F9'}},x:{grid:{display:false}}}}});
    }
    if(rc&&cIVs.length){
      if(chartI.rad)chartI.rad.destroy();
      const last=cIVs[cIVs.length-1];
      chartI.rad=new Chart(rc,{type:'radar',data:{labels:SP.map(p=>p.s),datasets:[{label:'Latest',data:SP.map(p=>parseFloat(last.params?.[p.k]||0)),backgroundColor:'rgba(27,79,187,.15)',borderColor:'#1B4FBB',pointBackgroundColor:'#1B4FBB'}]},options:{scales:{r:{min:0,max:10,grid:{color:'rgba(0,0,0,.06)'}}},plugins:{legend:{display:false}}}});
    }
  }
}

window.submitAddQuestion=()=>{
  const role=document.getElementById('aq-role')?.value;
  const q=document.getElementById('aq-q')?.value.trim();
  const cat=document.getElementById('aq-cat')?.value.trim();
  const d=document.getElementById('aq-d')?.value;

  if(!S.questions[role])S.questions[role]=[];
  S.questions[role].push({id:`q_${uid()}`,q,cat,d});

window.showAddUser=()=>{
  const html=`${[['name','Full Name'],['username','Username'],['password','Temporary Password']].map(([k,l])=>`<div class="field"><label>${l} *</label><input id="au-${k}" placeholder="${l}"></div>`).join('')}
  <div class="field"><label>Assign Interview Roles</label><div style="display:grid;gap:6px;max-height:260px;overflow-y:auto;padding-right:4px">
    ${ROLES.map((r,i)=>`<label style="display:flex;align-items:center;gap:10px;padding:9px 12px;border:1.5px solid #E2E8F0;border-radius:9px;cursor:pointer;font-size:13px"><input type="checkbox" name="au-role" value="${esc(r)}" style="accent-color:#1B4FBB"> ${RICONS[i]} ${esc(r)}</label>`).join('')}
  </div></div>
  <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px"><button class="btn btn-secondary" onclick="closeModal('addUserModal')">Cancel</button><button class="btn btn-primary" onclick="submitAddUser()">Add Candidate</button></div>`;
  document.body.insertAdjacentHTML('beforeend',modal('addUserModal','Add Candidate',html,true));
};
window.submitAddUser=()=>{
  const name=document.getElementById('au-name')?.value.trim();
  const username=document.getElementById('au-username')?.value.trim();
  const password=document.getElementById('au-password')?.value;
  if(!name||!username||!password){alert('Fill all required fields.');return;}
  if(S.users.find(u=>u.username===username)){alert('Username already exists.');return;}
  const assignedRoles=[...document.querySelectorAll('input[name="au-role"]:checked')].map(el=>el.value);
  S.users.push({id:`u_${uid()}`,name,username,password,role:'candidate',assignedRoles});
  saveUsers();closeModal('addUserModal');renderContent();
};
window.archiveCandidate=id=>{
  const user=S.users.find(u=>u.id===id);
  if(!user||!confirm(`Archive ${user.name}?\n\nTheir profile and all interview history will be moved to the Archive. Restore them at any time.`))return;
  const userIVs=S.interviews.filter(i=>i.candidateId===id);
  S.archivedUsers.push({...user,archivedAt:new Date().toISOString()});
  const prev=db.get('fsna_archived_interviews')||[];
  db.set('fsna_archived_interviews',[...prev,...userIVs]);
  S.users=S.users.filter(u=>u.id!==id);
  S.interviews=S.interviews.filter(i=>i.candidateId!==id);
  saveUsers();saveIV();saveArchived();
  if(S.reportCandId===id)S.reportCandId=null;
  renderContent();render();
};

    ${S.archivedUsers.length?S.archivedUsers.map(c=>{
      const cIVs=aivs.filter(i=>i.candidateId===c.id);
      const avg=cIVs.length?(cIVs.reduce((a,iv)=>a+parseFloat(iv.overallScore||0),0)/cIVs.length).toFixed(1):null;
      return`<div class="archived-card" style="margin-bottom:14px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px">

            <div style="width:44px;height:44px;background:#E2E8F0;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#94A3B8">${c.name[0].toUpperCase()}</div>

          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn btn-success btn-sm" onclick="restoreCandidate('${c.id}')">↩ Restore</button>
            <button class="btn btn-blue btn-sm" onclick="exportExcel('${c.id}',true)">📊 Export</button>
            <button class="btn btn-danger btn-sm" onclick="permDelete('${c.id}')">🗑 Delete Forever</button>
          </div>
        </div>
        <div class="grid-4">
          ${[['Sessions',cIVs.length,'#94A3B8'],['Avg Score',avg||'—',avg?sc2c(parseFloat(avg)):'#94A3B8'],['Best',cIVs.length?Math.max(...cIVs.map(iv=>parseFloat(iv.overallScore))).toFixed(1):'—','#94A3B8'],['Roles',c.assignedRoles?.length||0,'#94A3B8']].map(([l,v,c2])=>`<div class="stat-mini"><div class="sl">${l}</div><div class="sv" style="color:${c2};font-size:18px">${v}</div></div>`).join('')}
        </div>
      </div>`;
    }).join(''):
    `<div class="empty-state"><div class="icon">🗄️</div>No archived candidates. Use 🗄️ Archive on the Candidates tab.</div>`}`;
}
window.restoreCandidate=id=>{
  const user=S.archivedUsers.find(u=>u.id===id);
  if(!user||!confirm(`Restore ${user.name} as an active candidate?`))return;
  const{archivedAt,...active}=user;
  S.users.push(active);
  const aivs=db.get('fsna_archived_interviews')||[];
  S.interviews.push(...aivs.filter(i=>i.candidateId===id));
  S.archivedUsers=S.archivedUsers.filter(u=>u.id!==id);
  db.set('fsna_archived_interviews',aivs.filter(i=>i.candidateId!==id));
  saveUsers();saveIV();saveArchived();renderContent();render();
};
window.permDelete=id=>{
  const user=S.archivedUsers.find(u=>u.id===id);
  if(!confirm(`⚠️ Permanently delete ${user?.name}?\nAll data erased forever. This CANNOT be undone.`))return;
  S.archivedUsers=S.archivedUsers.filter(u=>u.id!==id);
  const aivs=db.get('fsna_archived_interviews')||[];
  db.set('fsna_archived_interviews',aivs.filter(i=>i.candidateId!==id));
  saveArchived();renderContent();
};

window.changeAdminPw=()=>{
  const admin=S.users.find(u=>u.role==='admin');
  const cur=document.getElementById('apw-cur')?.value,nxt=document.getElementById('apw-new')?.value,con=document.getElementById('apw-con')?.value;

  if(cur!==admin?.password){msg.textContent='❌ Current password incorrect.';msg.style.color='#EF4444';msg.style.display='block';return;}
  if(nxt.length<6){msg.textContent='❌ New password must be at least 6 characters.';msg.style.color='#EF4444';msg.style.display='block';return;}
  if(nxt!==con){msg.textContent='❌ Passwords do not match.';msg.style.color='#EF4444';msg.style.display='block';return;}
  S.users=S.users.map(u=>u.role==='admin'?{...u,password:nxt}:u);

window.exportExcel=(candId,fromArchive)=>{
  let ivData=fromArchive?(db.get('fsna_archived_interviews')||[]):[...S.interviews];
  if(candId)ivData=ivData.filter(i=>i.candidateId===candId);
  if(!ivData.length){alert('No data to export.');return;}
  const summary=ivData.map((iv,n)=>({'#':n+1,'Candidate':iv.candidateName,'Coach':iv.coachName||'','Role':iv.role,'Date':fmtDate(iv.date),'Overall':iv.overallScore,'Duration (min)':iv.durationMin||'',...Object.fromEntries(SP.map(p=>[p.l,iv.params?.[p.k]||'']))}));
  const detail=[];
  ivData.forEach((iv,n)=>(iv.scores||[]).forEach((s,q)=>detail.push({'Candidate':iv.candidateName,'Attempt':n+1,'Role':iv.role,'Date':fmtDate(iv.date),'Q#':q+1,'Question':s.question,'Answer':s.answer,'Overall':s.overallScore,...Object.fromEntries(SP.map(p=>[p.l,s[p.k]||''])),'Feedback':s.feedback,'Strength':s.strengths,'Improve':s.improvement})));
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(summary),'Summary');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(detail),'Detailed Responses');
  XLSX.writeFile(wb,`FSNA_${fromArchive?'Archive_':''}${new Date().toISOString().split('T')[0]}.xlsx`);
};

function setPhase(phase){
  const av=document.getElementById('coach-avatar');
  const dot=document.getElementById('coach-dot');
  const st=document.getElementById('coach-status-text');
  const cw=document.getElementById('coach-waveform');
  const caw=document.getElementById('cand-waveform');
  const pl=document.getElementById('iv-phase-label');
  if(!av)return;
  av.className='coach-avatar';dot.className='coach-status-dot';
  cw.className='waveform-box waveform-coach';caw.className='waveform-box waveform-cand';
  if(phase==='speaking'){
    av.classList.add('speaking');dot.classList.add('speaking');
    st.textContent='Speaking…';cw.classList.add('wf-active');
    pl&&(pl.textContent='Coach is speaking');
  }else if(phase==='listening'){
    av.className='coach-avatar listening';dot.classList.add('listening');
    st.textContent='Listening…';caw.classList.add('wf-active');
    pl&&(pl.textContent='Listening — speak your answer');
  }else if(phase==='scoring'){
    dot.classList.add('scoring');st.textContent='Analysing…';
    pl&&(pl.textContent='Analysing your response…');
  }else{
    st.textContent='Ready';pl&&(pl.textContent='Ready');
  }
}

function startIVSession(){
  const coach=S.iv.coach||COACHES[0];
  const role=S.iv.selectedRole||S.user?.assignedRoles?.[0]||ROLES[0];
  const pool=(S.questions[role]||[]);
  if(!pool.length){alert('No questions available.');navigate('candidate');return;}
  const qs=[...pool].sort(()=>Math.random()-.5).slice(0,Math.min(S.iv.qCount,pool.length));
  S.iv.role=role;S.iv.questions=qs;S.iv.idx=0;S.iv.scores=[];S.iv.currentScore=null;
  S.iv.transcript='';S.iv.sessionStart=Date.now();S.iv.fullTranscript=[];
  // Start timer
  clearInterval(tickTimer);S.iv.timerSec=0;
  tickTimer=setInterval(()=>{S.iv.timerSec++;const el=document.getElementById('iv-timer');if(el)el.textContent=`⏱ ${fmtTime(S.iv.timerSec)}`;},1000);
  // Greeting
  setPhase('speaking');
  const greeting=coach.opening(S.user?.name||'there',role,qs.length);
  addTranscript('coach',greeting);
  Voice.speak(greeting,()=>askIVQuestion(qs,0),coach.id);
}

function updateProgress(idx,total){
  const pct=(idx/total)*100;
  const el=document.getElementById('iv-prog');const lb=document.getElementById('iv-prog-label');
  if(el)el.style.width=`${pct}%`;if(lb)lb.textContent=`Question ${Math.min(idx+1,total)} of ${total}`;
}

function askIVQuestion(qs,idx){
  const coach=S.iv.coach||COACHES[0];
  S.iv.idx=idx;S.iv.transcript='';finalText='';
  updateProgress(idx,qs.length);
  const q=qs[idx];
  // Update question card
  const numEl=document.getElementById('iv-q-num');
  const catEl=document.getElementById('iv-q-cat');
  const diffEl=document.getElementById('iv-q-diff');
  const textEl=document.getElementById('iv-q-text');
  if(numEl)numEl.textContent=`QUESTION ${idx+1} OF ${qs.length}`;
  if(catEl)catEl.textContent=q.cat;
  if(diffEl)diffEl.innerHTML=diffTag(q.d);
  if(textEl)textEl.textContent=q.q;
  // Clear score panel and transcript
  const sp=document.getElementById('score-panel');if(sp){sp.style.display='none';sp.innerHTML='';}
  const tr=document.getElementById('iv-transcript');if(tr)tr.textContent='Listening…';
  // Update controls
  const ctrl=document.getElementById('iv-controls');if(ctrl)ctrl.innerHTML='';
  // Speak question with coach intro
  setPhase('speaking');
  const intro=coach.qIntro(idx+1,qs.length,q.cat,S.iv.role);
  const fullSpeech=`${intro} ${q.q}`;
  addTranscript('coach',fullSpeech);
  Voice.speak(fullSpeech,()=>{
    setPhase('listening');
    updateControls('listening');
    const hasVoice=!!(window.SpeechRecognition||window.webkitSpeechRecognition);
    if(hasVoice&&S.iv.useVoice){
      startRec(txt=>{
        const tr=document.getElementById('iv-transcript');
        if(tr){tr.textContent=txt;tr.scrollTop=tr.scrollHeight;}
        S.iv.transcript=txt;
      },(final)=>{
        S.iv.transcript=final;
        processIVAnswer(final);
      });
    }
  },coach.id);
}

function updateControls(phase){
  const ctrl=document.getElementById('iv-controls');if(!ctrl)return;
  if(phase==='listening'){
    const hasVoice=!!(window.SpeechRecognition||window.webkitSpeechRecognition);
    if(hasVoice&&S.iv.useVoice){
      ctrl.innerHTML=`<button class="btn-stop" onclick="manualStopRec()">⏹ Stop &amp; Submit</button>`;
    }else{
      ctrl.innerHTML=`<button class="btn-submit" onclick="submitTyped()">Submit Answer →</button>`;
    }
  }else if(phase==='speaking-feedback'){
    // Coach is delivering feedback — show a "listening" indicator, no skip option
    ctrl.innerHTML=`<div style="display:flex;align-items:center;gap:10px;color:#64748B;font-size:13px;padding:10px 16px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:12px"><span style="width:8px;height:8px;border-radius:50%;background:#3B7BE6;animation:dotPulse 1s infinite;display:inline-block"></span>Coach is giving feedback — please listen…</div>`;
  }else if(phase==='review'){
    const nextLabel=S.iv.idx+1>=S.iv.questions.length?'See Results →':'Next Question →';
    ctrl.innerHTML=`<button class="btn-next" onclick="nextIVQuestion()" style="animation:fadeInUp .3s ease">${nextLabel}</button>`;
  }else{
    ctrl.innerHTML='';
  }
}

window.manualStopRec=()=>{
  stopRec();
  const ans=S.iv.transcript.trim();
  if(!ans){alert('Nothing recorded. Please speak before stopping.');return;}
  processIVAnswer(ans);
};
window.submitTyped=()=>{
  const tr=document.getElementById('iv-transcript');
  const ans=(tr?.textContent||'').trim();
  if(!ans||ans==='Listening…'){alert('Please type your answer.');return;}
  processIVAnswer(ans);
};

async function processIVAnswer(answer){
  stopRec();
  setPhase('scoring');updateControls('scoring');
  addTranscript('candidate',answer);
  // Analysis pause — gives visual "thinking" moment
  await new Promise(r=>setTimeout(r,900));
  const q=S.iv.questions[S.iv.idx];
  const scoreObj=Coach.score(q.q,answer,S.iv.role);
  const qScore={questionId:q.id,question:q.q,answer,...scoreObj};
  S.iv.scores.push(qScore);
  S.iv.currentScore=qScore;
  // Update live score panel in sidebar
  SP.forEach(p=>{
    const el=document.getElementById(`rt-${p.k}`);
    if(el){el.textContent=qScore[p.k];el.style.color=sc2c(qScore[p.k]);}
  });
  // Show score breakdown panel immediately (visual)
  showScorePanel(qScore);
  setPhase('review');
  // Hide Next button while coach is speaking feedback — show only after speech ends
  updateControls('speaking-feedback');
  const coach=S.iv.coach||COACHES[0];
  // Generate rich, specific spoken feedback
  const spokenFeedback=generateSpokenFeedback(scoreObj,answer,S.iv.role,q.cat||'',coach);
  addTranscript('coach',spokenFeedback);
  // Speak the full feedback, reveal Next button only after speech completes
  Voice.speak(spokenFeedback,()=>{
    updateControls('review');
  },coach.id);
}

function showScorePanel(sc){
  const sp=document.getElementById('score-panel');if(!sp)return;
  sp.style.display='block';
  sp.innerHTML=`<div class="score-reveal">
    <div class="score-reveal-header">
      <div style="font-size:14px;font-weight:700;color:#E2E8F0">Question Score</div>
      <div class="score-overall" style="color:${sc2c(sc.overallScore)}">${sc.overallScore}<span style="font-size:14px;color:#475569">/10</span></div>
    </div>
    <div class="score-grid">${SP.map(p=>`<div class="score-cell"><div class="sv" style="color:${sc2c(sc[p.k])}">${sc[p.k]}</div><div class="sk">${p.s}</div></div>`).join('')}</div>
    <div class="score-fb">💬 ${esc(sc.feedback)}</div>
    <div class="score-tags">
      ${sc.strengths?`<span style="padding:4px 12px;background:rgba(16,185,129,.15);color:#6EE7B7;border-radius:20px;font-size:12px">✓ ${esc(sc.strengths)}</span>`:''}
      ${sc.improvement?`<span style="padding:4px 12px;background:rgba(239,68,68,.15);color:#FCA5A5;border-radius:20px;font-size:12px">↑ ${esc(sc.improvement)}</span>`:''}
    </div>
  </div>`;
}

window.nextIVQuestion=()=>{
  const next=S.iv.idx+1;
  if(next>=S.iv.questions.length){completeIVSession();}
  else{askIVQuestion(S.iv.questions,next);}
};

function completeIVSession(){
  clearInterval(tickTimer);
  Voice.stop();stopRec();
  const scores=S.iv.scores;
  if(!scores.length){navigate('candidate');return;}
  const avg=k=>parseFloat((scores.reduce((a,s)=>a+(parseFloat(s[k])||0),0)/scores.length).toFixed(1));
  const overall=parseFloat((scores.reduce((a,s)=>a+(s.overallScore||0),0)/scores.length).toFixed(1));
  const coach=S.iv.coach||COACHES[0];
  const closing=coach.closing(S.user?.name||'there',overall);
  addTranscript('coach',closing);
  const iv={
    id:`iv_${uid()}`,candidateId:S.user?.id,candidateName:S.user?.name,
    coachId:coach.id,coachName:coach.name,role:S.iv.role,
    date:new Date().toISOString(),scores,overallScore:overall,
    durationMin:Math.round(S.iv.timerSec/60),
    fullTranscript:S.iv.fullTranscript,
    params:Object.fromEntries(SP.map(p=>[p.k,avg(p.k)]))
  };
  S.interviews.unshift(iv);saveIV();
  // Auto-sync to OneDrive if connected
  if(OD.connected)OD.syncSession(iv).catch(()=>{});
  Voice.speak(closing,()=>navigate('results'),coach.id);
}

function addTranscript(role,text){
  S.iv.fullTranscript.push({role,text,ts:new Date().toISOString()});
}

window.exitInterview=()=>{
  if(!confirm('Exit the interview? Your progress will not be saved.'))return;
  clearInterval(tickTimer);Voice.stop();stopRec();S.iv.scores=[];
  navigate('candidate');
};

// ONEDRIVE INTEGRATION (Microsoft Graph + MSAL)
// ═══════════════════════════════════════════════════
const OD={
  app:null,account:null,FOLDER:'FSNAInterviews',
  get clientId(){return localStorage.getItem('fsna_ms_clientid')||'';},
  get connected(){return !!(localStorage.getItem('fsna_od_connected')&&OD.account);},

  async init(){
    if(!window.msal)return false;   // silently skip — MSAL optional until user connects
    const cid=OD.clientId;
    if(!cid)return false;
    const cfg={
      auth:{clientId:cid,authority:'https://login.microsoftonline.com/common',
            redirectUri:window.location.href.split('?')[0].split('#')[0]},
      cache:{cacheLocation:'localStorage',storeAuthStateInCookie:false}
    };
    try{
      OD.app=new msal.PublicClientApplication(cfg);
      await OD.app.initialize();
      const accounts=OD.app.getAllAccounts();
      if(accounts.length>0){OD.account=accounts[0];return true;}
    }catch(e){/* silent */}
    return false;
  },

  async connect(){
    if(!window.msal){
      alert('The Microsoft authentication library could not be loaded.\n\nPlease check your internet connection and reload the page, then try connecting again.');
      return false;
    }
    if(!OD.clientId){alert('Please enter your Azure Application (Client) ID in Settings first.');return false;}
    if(!OD.app)await OD.init();
    try{
      const r=await OD.app.loginPopup({
        scopes:['Files.ReadWrite','User.Read','offline_access'],
        prompt:'select_account'
      });
      OD.account=r.account;
      localStorage.setItem('fsna_od_connected','1');
      localStorage.setItem('fsna_od_account_name',r.account.name||r.account.username);
      localStorage.setItem('fsna_od_account_email',r.account.username);
      OD.updateStatus();
      return true;
    }catch(e){
      if(e.errorCode!=='user_cancelled')alert('OneDrive sign-in failed: '+e.message);
      return false;
    }
  },

  async getToken(){
    if(!OD.app||!OD.account)return null;
    try{
      const r=await OD.app.acquireTokenSilent({scopes:['Files.ReadWrite'],account:OD.account});
      return r.accessToken;
    }catch{
      try{const r=await OD.app.acquireTokenPopup({scopes:['Files.ReadWrite'],account:OD.account});return r.accessToken;}
      catch{return null;}
    }
  },

  async ensureFolder(){
    const token=await OD.getToken();if(!token)return false;
    // Check / create FSNAInterviews folder
    try{
      const chk=await fetch(`https://graph.microsoft.com/v1.0/me/drive/root:/${OD.FOLDER}`,{headers:{Authorization:'Bearer '+token}});
      if(chk.status===404){
        await fetch('https://graph.microsoft.com/v1.0/me/drive/root/children',{
          method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},
          body:JSON.stringify({name:OD.FOLDER,folder:{},['@microsoft.graph.conflictBehavior']:'rename'})
        });
      }
      return true;
    }catch{return false;}
  },

  async upload(filename,content){
    const token=await OD.getToken();if(!token)return false;
    try{
      const r=await fetch(`https://graph.microsoft.com/v1.0/me/drive/root:/${OD.FOLDER}/${filename}:/content`,{
        method:'PUT',
        headers:{Authorization:'Bearer '+token,'Content-Type':'application/json;charset=utf-8'},
        body:typeof content==='string'?content:JSON.stringify(content,null,2)
      });
      return r.ok;
    }catch{return false;}
  },

  async syncSession(iv){
    if(!OD.connected)return;
    await OD.ensureFolder();
    const fname=`session_${iv.date.replace(/[:.]/g,'-')}_${iv.candidateName?.replace(/\s+/g,'_')}.json`;
    await OD.upload(fname,iv);
    await OD.syncRepository();
    const ts=new Date().toLocaleString();
    localStorage.setItem('fsna_od_last_sync',ts);
    OD.updateStatus();
  },

  async syncRepository(){
    if(!OD.connected)return;
    await OD.ensureFolder();
    await OD.upload('repository.json',S.interviews);
    // Also upload a summary CSV-style JSON for easy reading
    const summary=S.interviews.map((iv,n)=>({
      '#':n+1,'Candidate':iv.candidateName,'Coach':iv.coachName||'','Role':iv.role,
      'Date':fmtDate(iv.date),'Overall':iv.overallScore,'Duration (min)':iv.durationMin||'',
      ...Object.fromEntries(SP.map(p=>[p.l,iv.params?.[p.k]||'']))
    }));
    await OD.upload('summary.json',summary);
  },

  async manualSync(){
    if(!OD.connected){
      const ok=await OD.connect();
      if(!ok)return;
    }
    const btn=document.getElementById('od-sync-btn');
    if(btn){btn.textContent='Syncing…';btn.disabled=true;}
    await OD.ensureFolder();
    // Upload all interviews
    for(const iv of S.interviews){
      const fname=`session_${(iv.date||'').replace(/[:.]/g,'-')}_${(iv.candidateName||'').replace(/\s+/g,'_')}.json`;
      await OD.upload(fname,iv);
    }
    await OD.syncRepository();
    const ts=new Date().toLocaleString();
    localStorage.setItem('fsna_od_last_sync',ts);
    if(btn){btn.textContent='Sync to OneDrive';btn.disabled=false;}
    OD.updateStatus();
    alert(`Sync complete. ${S.interviews.length} session(s) uploaded to OneDrive → ${OD.FOLDER}/`);
  },

  disconnect(){
    if(OD.app&&OD.account){try{OD.app.logoutPopup({account:OD.account}).catch(()=>{});}catch{}}
    OD.account=null;
    localStorage.removeItem('fsna_od_connected');
    localStorage.removeItem('fsna_od_account_name');
    localStorage.removeItem('fsna_od_account_email');
    OD.updateStatus();
  },

  updateStatus(){
    const el=document.getElementById('od-status-badge');
    if(!el)return;
    if(OD.connected){
      const name=localStorage.getItem('fsna_od_account_email')||'connected';
      const last=localStorage.getItem('fsna_od_last_sync');
      el.innerHTML=`<span style="color:#16A34A;font-weight:600">✅ Connected: ${esc(name)}</span>${last?`<br><span style="color:#64748B;font-size:11px">Last sync: ${last}</span>`:''}`;
    }else{
      el.innerHTML=`<span style="color:#94A3B8">Not connected</span>`;
    }
    const repoBadge=document.getElementById('od-repo-status');
    if(repoBadge){
      const last=localStorage.getItem('fsna_od_last_sync');
      if(OD.connected&&last)repoBadge.innerHTML=`<span style="color:#16A34A;font-size:12px">☁️ OneDrive synced · Last: ${last}</span>`;
      else if(OD.connected)repoBadge.innerHTML=`<span style="color:#F59E0B;font-size:12px">☁️ OneDrive connected — not yet synced</span>`;
      else repoBadge.innerHTML=`<span style="color:#94A3B8;font-size:12px">☁️ OneDrive not connected (configure in Settings)</span>`;
    }
  }
};

// ── FIELD NORMALISER ──────────────────────────────────────────
const normaliseQ=arr=>(arr||[]).map(item=>{
  if(item.question&&!item.q)item.q=item.question;
  if(!item.cat&&item.category)item.cat=item.category;
  if(!item.d&&item.difficulty)item.d=item.difficulty;
  return item;
});

// ── APPLY CONFIG (users + questions from any source) ──────────
function applyConfig(cfg,source){
  // Merge users: add any from config that don't exist locally by username
  if(cfg.users&&Array.isArray(cfg.users)){
    const existing=new Set(S.users.map(u=>u.username));
    const newUsers=cfg.users.filter(u=>!existing.has(u.username));
    if(newUsers.length){
      S.users=[...S.users,...newUsers];
      db.set('fsna_users',S.users);
      console.info(`[Config] Added ${newUsers.length} user(s) from ${source}`);
    }
    // Also update existing users' assignedRoles if config has them
    cfg.users.forEach(cu=>{
      const lu=S.users.find(u=>u.username===cu.username);
      if(lu&&cu.assignedRoles){lu.assignedRoles=cu.assignedRoles;}
    });
    db.set('fsna_users',S.users);
  }
  // Merge questions: use config questions for any role that is empty locally
  if(cfg.questions&&typeof cfg.questions==='object'){
    let changed=false;
    ROLES.forEach(r=>{
      if(cfg.questions[r]&&cfg.questions[r].length>0){
        if(!S.questions[r]||S.questions[r].length===0){
          S.questions[r]=normaliseQ(cfg.questions[r]);changed=true;
        }
      }
    });
    if(changed)db.set('fsna_questions',S.questions);
  }
  // Persist config version tag so we know where data came from
  if(cfg.version)localStorage.setItem('fsna_config_version',cfg.version);
}

// ── FETCH REMOTE CONFIG from Netlify (config.json alongside HTML) ──
async function fetchRemoteConfig(){
  // Only attempt if running from http(s) — not from file://
  if(!location.protocol.startsWith('http'))return null;
  try{
    const r=await fetch('./config.json',{cache:'no-cache'});
    if(!r.ok)return null;
    const cfg=await r.json();
    console.info('[Config] Remote config.json loaded from server');
    return cfg;
  }catch{return null;}
}

function updateConfigStatus(){

  }else{
    el.innerHTML='<div class="info-banner info-blue">ℹ️ Running locally · '+candCount+' candidate(s) in this browser only · click <b>⬇️ Export Updated HTML</b> to create a shareable file</div>';
  }
}

window.exportConfig=()=>{
  // Build the candidate array to embed (no passwords in plain text — we keep them as-is
  // since this file is admin-controlled and distributed intentionally)
  const candidates=S.users.filter(u=>u.role!=='admin').map(u=>({
    id:u.id, name:u.name, username:u.username, password:u.password,
    role:'candidate', assignedRoles:u.assignedRoles||[]
  }));
  if(!candidates.length){
    alert('No candidates to export yet.\n\nCreate candidates first (Candidates tab → + Add Candidate), then click Export Updated HTML.');
    return;
  }
  // Get the current HTML source
  const htmlSrc=document.documentElement.outerHTML;
  // Replace the DEFAULT_CANDIDATES placeholder with actual data
  const placeholder='const DEFAULT_CANDIDATES=[];';
  const embedded='const DEFAULT_CANDIDATES='+JSON.stringify(candidates)+';';
  if(!htmlSrc.includes(placeholder)){
    alert('Could not find the DEFAULT_CANDIDATES placeholder in the HTML source.\nThis can happen if the file was already exported previously.\nPlease use the original FSNA_Interview_Coach_v3.html as your base file and try again.');
    return;
  }
  const updatedHTML=htmlSrc.replace(placeholder,embedded);
  // Download the updated HTML file
  const blob=new Blob([updatedHTML],{type:'text/html;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='FSNA_Interview_Coach_v3.html';
  a.click();
  URL.revokeObjectURL(a.href);
  setTimeout(()=>alert(
    'Updated HTML downloaded with '+candidates.length+' candidate account(s) embedded!\n\n'+
    'WHAT TO DO NEXT:\n'+
    '1. Go to your Netlify site dashboard\n'+
    '2. Deploys tab → drag just this ONE updated HTML file onto the deploy zone\n'+
    '3. Netlify deploys it in ~10 seconds\n'+
    '4. Any device that visits your Netlify URL will automatically have all candidate accounts\n\n'+
    'TIP: Every time you add new candidates, repeat this process:\n'+
    'Add candidate → Export Updated HTML → Upload to Netlify'
  ),300);
};

// ── IMPORT CONFIG from a local file (manual fallback) ──
window.importConfig=()=>{
  const input=document.createElement('input');
  input.type='file';input.accept='.json,application/json';
  input.onchange=async e=>{
    const file=e.target.files[0];if(!file)return;
    try{
      const text=await file.text();
      const cfg=JSON.parse(text);
      applyConfig(cfg,'imported file');
      S.users=db.get('fsna_users')||S.users;
      S.questions=db.get('fsna_questions')||S.questions;
      alert('Config imported successfully! '+
        (cfg.users?.length||0)+' candidate(s) loaded.\n\nPage will refresh.');
      location.reload();
    }catch(err){alert('Failed to read config file. Make sure it is a valid config.json exported from this app.');}
  };
  input.click();
};

// ── MAIN INIT ─────────────────────────────────────────────────
async function init(){
  // 1. Load local data first
  let u=db.get('fsna_users');
  if(!u?.length){
    u=[{id:'admin0',name:'Administrator',username:'admin',password:'Flexton@2024',role:'admin',assignedRoles:ROLES}];
    db.set('fsna_users',u);
  }
  // Seed any DEFAULT_CANDIDATES embedded by admin's "Export Updated HTML"
  if(DEFAULT_CANDIDATES&&DEFAULT_CANDIDATES.length){
    const existing=new Set(u.map(x=>x.username));
    let added=false;
    DEFAULT_CANDIDATES.forEach(c=>{
      if(!existing.has(c.username)){u.push(c);existing.add(c.username);added=true;}
      else{
        // Update assignedRoles if they changed
        const lu=u.find(x=>x.username===c.username);
        if(lu&&c.assignedRoles)lu.assignedRoles=c.assignedRoles;
        added=true;
      }
    });
    if(added)db.set('fsna_users',u);
  }
  S.users=u;

  let q=db.get('fsna_questions');
  if(!q){
    q={};ROLES.forEach(r=>{q[r]=DQ[r]||[];});
    db.set('fsna_questions',q);
  }else{
    let changed=false;
    ROLES.forEach(r=>{
      if(!q[r]||q[r].length===0){q[r]=DQ[r]||[];changed=true;}
      else{q[r]=normaliseQ(q[r]);changed=true;}
    });
    if(changed)db.set('fsna_questions',q);
  }
  S.questions=q;

  let iv=db.get('fsna_interviews');S.interviews=iv||[];
  let au=db.get('fsna_archived_users');S.archivedUsers=au||[];

  // 2. Try to fetch remote config.json (only works when hosted on Netlify/server)
  //    If found, merge any new candidates/questions into local data
  const remoteCfg=await fetchRemoteConfig();
  if(remoteCfg){
    applyConfig(remoteCfg,'config.json');
    // Reload state from db after merge
    S.users=db.get('fsna_users')||S.users;
    S.questions=db.get('fsna_questions')||S.questions;
  }

  S.iv.coach=COACHES[0];
  render();
}
document.addEventListener('DOMContentLoaded',init);
</script>
